[build]
  command   = "npm run build"
  publish   = "dist"

# Configuração do Decap CMS com OAuth do GitHub via Netlify
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

# Redirect após envio do formulário de contato
[[redirects]]
  from    = "/contato-enviado"
  to      = "/contato?enviado=ok"
  status  = 200

# SPA fallback (precaução)
[[redirects]]
  from   = "/*"
  to     = "/404"
  status = 404
